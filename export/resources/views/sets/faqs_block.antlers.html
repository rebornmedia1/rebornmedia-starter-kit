{{ if type == "faqs_block"}}
    <!-- daisy ui -->
    <div class="container mx-auto px-8 py-12 text-lg">
        <div class="flex flex-wrap -mx-4">
            <div class="w-full 2xl:w-2/3 mx-auto  text-center justify-center">
                <h2 class="text-2xl lg:text-4xl font-bold mb-2">{{ faqs_block_title }}</h2>
                {{ if faqs_block_content }}
                    <div class="prose xl:prose-xl">{{ faqs_block_content }} </div>
                {{ /if }}
            </div>
            {{ faqs_block_faqs }}


            <div class="w-full 2xl:w-2/3 mt-8 mx-auto px-4">
                <div class="collapse collapse-arrow bg-base-100 border border-base-300">
                    <input type="radio" name="my-accordion-2"  />
                    <div class="collapse-title font-semibold">{{ question }}</div>
                    <div class="collapse-content text-sm">{{ answer }}</div>
                </div>
            </div>

            {{ /faqs_block_faqs }}
        </div>
    </div>
    </div>
{{ /if }}
